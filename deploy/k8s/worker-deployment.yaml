apiVersion: apps/v1
kind: Deployment
metadata:
  name: aimp-worker
  labels:
    app: aimiddleplatform
    component: worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: aimiddleplatform
      component: worker
  template:
    metadata:
      labels:
        app: aimiddleplatform
        component: worker
    spec:
      containers:
        - name: worker
          image: aimiddleplatform:0.1.0
          imagePullPolicy: IfNotPresent
          command: ["python", "-m", "src.worker"]
          envFrom:
            - configMapRef:
                name: aimp-config
          env:
            - name: JWT_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: aimp-secret
                  key: jwt_secret_key
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "2000m"
              memory: "2Gi"
