apiVersion: apps/v1
kind: Deployment
metadata:
  name: aimp-redis
  labels:
    app: aimiddleplatform
    component: redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: aimiddleplatform
      component: redis
  template:
    metadata:
      labels:
        app: aimiddleplatform
        component: redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
