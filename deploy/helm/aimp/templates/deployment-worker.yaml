{{- if .Values.worker.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "aimp.fullname" . }}-worker
  labels:
    {{- include "aimp.labels" . | nindent 4 }}
    component: worker
spec:
  replicas: {{ .Values.worker.replicaCount }}
  selector:
    matchLabels:
      {{- include "aimp.selectorLabels" . | nindent 6 }}
      component: worker
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "aimp.labels" . | nindent 8 }}
        component: worker
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "aimp.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      {{- if .Values.gpu.enabled }}
      nodeSelector:
        {{- toYaml .Values.gpu.nodeSelector | nindent 8 }}
      {{- else }}
      {{- with .Values.worker.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- end }}
      {{- with .Values.worker.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.worker.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: worker
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: {{ toJson .Values.worker.command }}
          envFrom:
            - configMapRef:
                name: {{ include "aimp.fullname" . }}-config
          env:
            - name: JWT_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "aimp.fullname" . }}-secret
                  key: jwt_secret_key
          resources:
            {{- toYaml .Values.worker.resources | nindent 12 }}
          {{- if .Values.gpu.enabled }}
            {{- toYaml .Values.gpu.resources | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: data
              mountPath: /app/data
              subPath: data
            - name: models
              mountPath: /app/models
              subPath: models
            - name: logs
              mountPath: /app/logs
              subPath: logs
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "aimp.fullname" . }}-data
            readOnly: false
        - name: models
          persistentVolumeClaim:
            claimName: {{ include "aimp.fullname" . }}-models
            readOnly: false
        - name: logs
          persistentVolumeClaim:
            claimName: {{ include "aimp.fullname" . }}-logs
            readOnly: false
{{- end }}
