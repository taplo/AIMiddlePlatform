name: CI Pipeline

on:
  push:
    branches: [master, main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        run: |
          rm -rf /tmp/aimp_ci
          git clone http://192.168.3.122:3000/taplo/aimiddleplatform.git /tmp/aimp_ci
          cd /tmp/aimp_ci
          git checkout $GITHUB_SHA

      - name: Run tests
        run: |
          cd /tmp/aimp_ci
          python3 -m venv .venv_ci
          .venv_ci/bin/pip install uv -q
          .venv_ci/bin/uv sync
          .venv_ci/bin/python -m pytest tests/ -v
