app:
  name: aimiddleplatform
  version: 0.1.0

ingestion:
  max_streams: 1000
  default_fps: 1.0
  fps_options: [0.5, 1.0, 2.0, 5.0, 10.0, 30.0]
  reconnect_interval: 5
  frame_timeout: 30

queue:
  type: redis_streams
  redis_url: redis://redis:6379/0
  consumer_group: ingestion_workers
  max_backlog: 10000

cache:
  enabled: true
  max_duration: 5
  buffer_size_mb: 512

database:
  url: sqlite+aiosqlite:///data/aimp.db

storage:
  enabled: true
  endpoint: minio:9000
  access_key: minioadmin
  secret_key: minioadmin
  bucket: aimp-results
  secure: false

worker:
  max_concurrent: 10
  db_queue_size: 200
  rule_queue_size: 200
