app:
  name: aimiddleplatform
  version: 0.1.0

ingestion:
  max_streams: 1000
  default_fps: 1.0
  fps_options: [0.5, 1.0, 2.0, 5.0, 10.0, 30.0]
  reconnect_interval: 5
  frame_timeout: 30

queue:
  type: redis_streams
  redis_url: ${QUEUE_REDIS_URL:-redis://localhost:6379/0}
  consumer_group: ingestion_workers
  max_backlog: 10000

cache:
  enabled: true
  max_duration: 5
  buffer_size_mb: 512

database:
  url: ${DATABASE_URL:-sqlite+aiosqlite:///data/aimp.db}

storage:
  enabled: true
  endpoint: ${S3_ENDPOINT:-minio:9000}
  access_key: ${S3_ACCESS_KEY:-minioadmin}
  secret_key: ${S3_SECRET_KEY:-minioadmin}
  bucket: ${S3_BUCKET:-aimp-results}
  secure: false
