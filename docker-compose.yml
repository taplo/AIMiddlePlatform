services:
  aimp-api:
    build:
      context: .
      dockerfile: Dockerfile
    image: taplo/aimiddleplatform:latest
    container_name: aimp-api
    ports:
      - "8000:8000"
    environment:
      - APP_ENV=production
      - QUEUE_REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=${DATABASE_URL:-sqlite+aiosqlite:///data/aimp.db}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-change-me-in-production}
    volumes:
      - ./data:/app/data
    depends_on:
      redis:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; r=urllib.request.urlopen('http://localhost:8000/api/v1/health'); assert r.status==200"]
      interval: 15s
      timeout: 5s
      retries: 3

  aimp-worker:
    image: taplo/aimiddleplatform:latest
    container_name: aimp-worker
    command: python -m src.worker
    depends_on:
      redis:
        condition: service_started
    environment:
      - APP_ENV=production
      - QUEUE_REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=${DATABASE_URL:-sqlite+aiosqlite:///data/aimp.db}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-change-me-in-production}
    volumes:
      - ./data:/app/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: aimp-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  nginx:
    image: nginx:alpine
    container_name: aimp-nginx
    ports:
      - "80:80"
    volumes:
      - ./frontend/dist:/usr/share/nginx/html:ro
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - aimp-api
    restart: unless-stopped

  mysql:
    image: mysql:8.0
    container_name: aimp-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-aimp_root}
      MYSQL_DATABASE: aimp
      MYSQL_USER: aimp
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-aimp_pass}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  redis_data:
  mysql_data:
